<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security - Flintlock</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="security.css">
</head>
<body>
    <div class="background-container">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <nav class="top-navbar">
        <div class="nav-left">
            <div class="menu-icon">☰</div>
            <!-- Using the white transparent logo -->
            <img src="../assets/logo-name-white.png" alt="Flintlock Logo" class="nav-logo-img">
        </div>
    </nav>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <a href="admin-dashboard.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/wrench.png" alt="Dashboard"><span>Dashboard</span></a>
        <a href="admin-profile.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/user.png" alt="Admin Profile"><span>Profile</span></a>
        <a href="admin-security.html" class="nav-item active"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/lock--v1.png" alt="Security"><span>Security</span></a>
        <a href="admin-about-us.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/info.png" alt="About Us"><span>About Us</span></a>
        <button class="sidebar-logout" id="logoutBtn"><img src="https://img.icons8.com/ios-filled/50/logout-rounded.png" alt="Logout">Logout</button>
    </aside>

    <main class="main-content">
        <section class="security-panel">
            <div class="security-heading">
                <span class="user-tag">First Name Last Name • Flintlock</span>
                <h1>Change password</h1>
                <p>The password must be at least 8 characters long and include at least one uppercase letter, one number (0–9), and one special character such as @, #, !, %, or _.</p>
            </div>

            <form class="security-form">
                <label class="field-label" for="current-password">Current Password</label>
                <div class="field-row">
                    <input id="current-password" type="password" value="password123">
                    <button type="button" class="icon-button" data-toggle="current-password">👁</button>
                </div>

                <label class="field-label" for="new-password">Enter your new password</label>
                <div class="field-row">
                    <input id="new-password" type="password" value="newpassword123">
                    <button type="button" class="icon-button" data-toggle="new-password">👁</button>
                </div>

                <label class="field-label" for="confirm-password">Confirm your new password</label>
                <div class="field-row">
                    <input id="confirm-password" type="password" value="newpassword123">
                    <button type="button" class="icon-button" data-toggle="confirm-password">👁</button>
                </div>

                <div class="form-message" id="security-message"></div>
                <button type="submit" class="btn-primary">Change password</button>
            </form>
        </section>
    </main>
    <div class="logout-modal" id="logoutModal">
        <div class="logout-modal-content">
            <h2 class="logout-modal-title">Logout</h2>
            <p class="logout-modal-text">Are you sure you want to logout?</p>
            <div class="logout-modal-actions">
                <button class="logout-modal-cancel" id="cancelLogout">Cancel</button>
                <button class="logout-modal-confirm" id="confirmLogout">Logout</button>
            </div>
        </div>
    </div>
    <script>
        const currentStoredPassword = 'password123';

        const securityForm = document.querySelector('.security-form');
        const currentInput = document.getElementById('current-password');
        const newInput = document.getElementById('new-password');
        const confirmInput = document.getElementById('confirm-password');
        const messageBox = document.getElementById('security-message');

        function showMessage(text, isError = true) {
            messageBox.textContent = text;
            messageBox.style.color = isError ? '#c0392b' : '#1a8f1a';
        }

        function togglePasswordVisibility(targetId) {
            const input = document.getElementById(targetId);
            if (!input) return;
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.querySelectorAll('.icon-button[data-toggle]').forEach(button => {
            button.addEventListener('click', () => {
                const target = button.dataset.toggle;
                togglePasswordVisibility(target);
            });
        });

        securityForm.addEventListener('submit', event => {
            event.preventDefault();

            const currentValue = currentInput.value.trim();
            const newValue = newInput.value.trim();
            const confirmValue = confirmInput.value.trim();

            if (currentValue !== currentStoredPassword) {
                showMessage('Current password does not match our records.');
                return;
            }

            if (!newValue) {
                showMessage('Please enter a new password.');
                return;
            }

            if (newValue !== confirmValue) {
                showMessage('New password and confirmation do not match.');
                return;
            }

            showMessage('Password changed successfully.', false);
            currentInput.value = '';
            newInput.value = '';
            confirmInput.value = '';
        });

        function setSidebarState(open) {
            document.body.classList.toggle('nav-open', open);
            localStorage.setItem('sidebarOpen', open ? '1' : '0');
        }

        if (localStorage.getItem('sidebarOpen') === '1') {
            setSidebarState(true);
        }

        document.querySelector('.menu-icon')?.addEventListener('click', () => {
            setSidebarState(!document.body.classList.contains('nav-open'));
        });

        // Logout functionality

        const logoutBtn = document.getElementById('logoutBtn');

        if (logoutBtn) {

            logoutBtn.addEventListener('click', () => {

                document.getElementById('logoutModal').classList.add('show');

            });

        }

        const logoutModal = document.getElementById('logoutModal');

        if (logoutModal) {

            logoutModal.addEventListener('click', (event) => {

                if (event.target === logoutModal) {

                    logoutModal.classList.remove('show');

                }

            });

            document.getElementById('cancelLogout')?.addEventListener('click', () => {

                logoutModal.classList.remove('show');

            });

            document.getElementById('confirmLogout')?.addEventListener('click', () => {

                window.location.href = 'login/index.html';

            });

        }
    </script>
</body>
</html>
