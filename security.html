<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security - Flintlock</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="security.css">
</head>
<body>
    <!-- Neumorphic Background -->
    <div class="background-container">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="top-navbar">
        <div class="nav-left">
            <div class="menu-icon">☰</div>
            <!-- Using the white transparent logo -->
            <img src="../assets/logo-name-white.png" alt="Flintlock Logo" class="nav-logo-img">
        </div>
    </nav>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <a href="homepage.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/home.png" alt="Home"><span>Home</span></a>
        <a href="profile.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/user.png" alt="Profile"><span>Profile</span></a>
        <a href="security.html" class="nav-item active"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/lock--v1.png" alt="Security"><span>Security</span></a>
        <a href="about-us.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/info.png" alt="About Us"><span>About Us</span></a>
        <button class="sidebar-logout" id="logoutBtn"><img src="https://img.icons8.com/ios-filled/50/logout-rounded.png" alt="Logout">Logout</button>
    </aside>

    <main class="main-content">
        <section class="security-panel">
            <div class="security-heading">
                <span class="user-tag" id="security-user-tag">Loading… • Flintlock</span>
                <h1>Change password</h1>
                <p>The password must be at least 8 characters long and include at least one uppercase letter, one number (0–9), and one special character such as @, #, !, %, or _.</p>
            </div>

            <form class="security-form">
                <label class="field-label" for="current-password">Current Password</label>
                <div class="field-row">
                    <input id="current-password" type="password" autocomplete="current-password" placeholder="Enter current password">
                    <button type="button" class="icon-button" data-toggle="current-password">👁</button>
                </div>

                <label class="field-label" for="new-password">Enter your new password</label>
                <div class="field-row">
                    <input id="new-password" type="password" autocomplete="new-password" placeholder="Enter new password">
                    <button type="button" class="icon-button" data-toggle="new-password">👁</button>
                </div>

                <label class="field-label" for="confirm-password">Confirm your new password</label>
                <div class="field-row">
                    <input id="confirm-password" type="password" autocomplete="new-password" placeholder="Confirm new password">
                    <button type="button" class="icon-button" data-toggle="confirm-password">👁</button>
                </div>

                <div class="form-message" id="security-message"></div>
                <button type="submit" class="btn-primary">Change password</button>
            </form>
        </section>
    </main>
    <script>
        const ME_API = new URL('api/me.php', window.location.href).href;
        const CHANGE_PASSWORD_API = new URL('api/change-password.php', window.location.href).href;
        const LOGOUT_API = new URL('api/logout.php', window.location.href).href;

        const securityForm = document.querySelector('.security-form');
        const currentInput = document.getElementById('current-password');
        const newInput = document.getElementById('new-password');
        const confirmInput = document.getElementById('confirm-password');
        const messageBox = document.getElementById('security-message');
        const submitBtn = securityForm.querySelector('button[type="submit"]');

        function showMessage(text, isError = true) {
            messageBox.textContent = text;
            messageBox.style.color = isError ? '#c0392b' : '#1a8f1a';
        }

        function meetsPasswordPolicy(password) {
            if (!password || password.length < 8) {
                return false;
            }
            if (!/[A-Z]/.test(password)) {
                return false;
            }
            if (!/[0-9]/.test(password)) {
                return false;
            }
            if (!/[@#!%_]/.test(password)) {
                return false;
            }
            return true;
        }

        function togglePasswordVisibility(targetId) {
            const input = document.getElementById(targetId);
            if (!input) {
                return;
            }
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.querySelectorAll('.icon-button[data-toggle]').forEach((button) => {
            button.addEventListener('click', () => {
                const target = button.dataset.toggle;
                togglePasswordVisibility(target);
            });
        });

        async function readJson(res) {
            const text = await res.text();
            try {
                return text ? JSON.parse(text) : {};
            } catch {
                return { _raw: text };
            }
        }

        async function loadHeadingFromProfile() {
            const tag = document.getElementById('security-user-tag');
            try {
                const response = await fetch(ME_API, { credentials: 'same-origin' });
                const data = await readJson(response);

                if (response.status === 401) {
                    window.location.href = 'login/index.html';
                    return;
                }

                if (!response.ok || !data.user) {
                    tag.textContent = 'Account • Flintlock';
                    return;
                }

                const d = data.user;
                const full = ((d.first_name || '') + ' ' + (d.last_name || '')).trim() || 'Account';
                tag.textContent = full + ' • Flintlock';
            } catch (e) {
                tag.textContent = 'Account • Flintlock';
            }
        }

        securityForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const currentValue = currentInput.value;
            const newValue = newInput.value;
            const confirmValue = confirmInput.value;

            if (!currentValue) {
                showMessage('Please enter your current password.');
                return;
            }

            if (!newValue) {
                showMessage('Please enter a new password.');
                return;
            }

            if (newValue !== confirmValue) {
                showMessage('New password and confirmation do not match.');
                return;
            }

            if (!meetsPasswordPolicy(newValue)) {
                showMessage('The password must be at least 8 characters long and include at least one uppercase letter, one number (0–9), and one special character such as @, #, !, %, or _.');
                return;
            }

            submitBtn.disabled = true;
            showMessage('');

            try {
                const response = await fetch(CHANGE_PASSWORD_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        current_password: currentValue,
                        new_password: newValue,
                    }),
                });
                const data = await readJson(response);

                if (!response.ok || !data.success) {
                    showMessage(data.message || data.error || ('Could not update password (HTTP ' + response.status + ').'));
                    return;
                }

                showMessage(data.message || 'Password changed successfully.', false);
                currentInput.value = '';
                newInput.value = '';
                confirmInput.value = '';
            } catch (err) {
                console.error(err);
                showMessage('Unable to change password. Check that Apache and PHP are running.');
            } finally {
                submitBtn.disabled = false;
            }
        });

        loadHeadingFromProfile();

        function setSidebarState(open) {
            document.body.classList.toggle('nav-open', open);
            localStorage.setItem('sidebarOpen', open ? '1' : '0');
        }

        if (localStorage.getItem('sidebarOpen') === '1') {
            setSidebarState(true);
        }

        document.querySelector('.menu-icon')?.addEventListener('click', () => {
            setSidebarState(!document.body.classList.contains('nav-open'));
        });

        const logoutBtn = document.getElementById('logoutBtn');
        const logoutModal = document.createElement('div');
        if (logoutBtn) {
            logoutModal.className = 'logout-modal';
            logoutModal.innerHTML = `
                <div class="logout-modal-content">
                    <h2 class="logout-modal-title">Logout</h2>
                    <p class="logout-modal-text">Are you sure you want to logout?</p>
                    <div class="logout-modal-actions">
                        <button class="logout-modal-cancel" id="cancelLogout">Cancel</button>
                        <button class="logout-modal-confirm" id="confirmLogout">Logout</button>
                    </div>
                </div>
            `;
            document.body.appendChild(logoutModal);

            logoutBtn.addEventListener('click', () => {
                logoutModal.classList.add('show');
            });

            logoutModal.addEventListener('click', (event) => {
                if (event.target === logoutModal) {
                    logoutModal.classList.remove('show');
                }
            });

            logoutModal.querySelector('#cancelLogout')?.addEventListener('click', () => {
                logoutModal.classList.remove('show');
            });

            logoutModal.querySelector('#confirmLogout')?.addEventListener('click', async () => {
                try {
                    await fetch(LOGOUT_API, { method: 'GET', credentials: 'same-origin' });
                } catch (e) {
                    console.warn(e);
                }
                localStorage.removeItem('user_id');
                localStorage.removeItem('role');
                localStorage.removeItem('account_type');
                logoutModal.classList.remove('show');
                window.location.href = 'login/index.html';
            });
        }
    </script>
</body>
</html>
