<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security - Flintlock</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="security.css">
</head>
<body>
    <!-- Neumorphic Background -->
    <div class="background-container">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="top-navbar">
        <div class="nav-left">
            <div class="menu-icon">☰</div>
            <!-- Using the white transparent logo -->
            <img src="../assets/logo-name-white.png" alt="Flintlock Logo" class="nav-logo-img">
        </div>
    </nav>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <a href="homepage.html" class="nav-item">🏠</a>
        <a href="profile.html" class="nav-item">👤</a>
        <a href="security.html" class="nav-item active">🔒</a>
        <a href="#" class="nav-item">ⓘ</a> 
    </aside>

    <main class="main-content">
        <section class="security-panel">
            <div class="security-heading">
                <span class="user-tag">First Name Last Name • Flintlock</span>
                <h1>Change password</h1>
                <p>The password must be at least 8 characters long and include at least one uppercase letter, one number (0–9), and one special character such as @, #, !, %, or _.</p>
            </div>

            <form class="security-form">
                <label class="field-label">Current Password</label>
                <div class="field-row">
                    <input type="password" value="password123" readonly>
                    <button type="button" class="icon-button">👁</button>
                </div>

                <label class="field-label">Enter your new password</label>
                <div class="field-row">
                    <input type="password" value="newpassword123" readonly>
                    <button type="button" class="icon-button">👁</button>
                </div>

                <label class="field-label">Confirm your new password</label>
                <div class="field-row">
                    <input type="password" value="newpassword123" readonly>
                    <button type="button" class="icon-button">👁</button>
                </div>

                <button type="submit" class="btn-primary">Change password</button>
            </form>
        </section>
    </main>
</body>
</html>
