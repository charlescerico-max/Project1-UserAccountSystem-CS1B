<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Flintlock</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <!-- Neumorphic Background -->
    <div class="background-container">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="top-navbar">
        <div class="nav-left">
            <div class="menu-icon">☰</div>
            <!-- Using the white transparent logo -->
            <img src="../assets/logo-name-white.png" alt="Flintlock Logo" class="nav-logo-img">
        </div>
    </nav>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <a href="homepage.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/home.png" alt="Home"></a>
        <a href="profile.html" class="nav-item active"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/user.png" alt="Profile"></a>
        <a href="security.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/lock--v1.png" alt="Security"></a>
        <a href="about-us.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/info.png" alt="About Us"></a>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="profile-wrapper">
            
            <!-- Left: Profile Card -->
            <div class="profile-card">
                <div class="avatar-circle">
                    <!-- Generic user silhouette -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h3 id="display-name">First Name Last Name</h3>
                <p id="display-username">@username</p>
            </div>

            <!-- Right: Profile Details (Read-only) -->
            <div class="profile-details">
                <div class="detail-row">
                    <div class="field-label-row">
                        <label>Name</label>
                    </div>
                    <div class="name-inputs">
                        <div class="input-group">
                            <input type="text" value="First Name" id="first-name" class="readonly-input" readonly>
                            <button type="button" class="input-icon" data-target="first-name">✏️</button>
                        </div>
                        <div class="input-group">
                            <input type="text" value="Last Name" id="last-name" class="readonly-input" readonly>
                            <button type="button" class="input-icon" data-target="last-name">✏️</button>
                        </div>
                    </div>
                </div>

                <div class="detail-row">
                    <div class="field-label-row">
                        <label>Username</label>
                    </div>
                    <div class="input-group">
                        <input type="text" value="username" id="username" class="readonly-input full-width" readonly>
                    </div>
                </div>

                <div class="detail-row">
                    <div class="field-label-row">
                        <label>Email Address</label>
                    </div>
                    <div class="input-group">
                        <input type="email" value="user@example.com" id="email" class="readonly-input full-width" readonly>
                        <button type="button" class="input-icon" data-target="email">✏️</button>
                    </div>
                </div>
            </div>

        </div>
    </main>
    <button id="deleteAccountBtn" type="button" class="btn-delete">Delete Account</button>

    <div class="overlay hidden" id="confirmOverlay">
        <div class="confirm-box">
            <p class="confirm-title">Are you sure you want to delete your account?</p>
            <p class="confirm-subtitle">This cannot be undone.</p>
            <div class="confirm-actions">
                <button id="cancelDeleteBtn" type="button" class="btn-cancel">No</button>
                <button id="proceedDeleteBtn" type="button" class="btn-yes">Yes</button>
            </div>
        </div>
    </div>

    <div class="overlay hidden" id="authOverlay">
        <div class="confirm-box delete-step">
            <p class="confirm-title">Confirm deletion</p>
            <p class="confirm-subtitle">Please enter your password once more before account removal.</p>
            <div class="auth-group">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" placeholder="Enter your password">
            </div>
            <div class="auth-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
            </div>
            <div class="confirm-actions">
                <button id="cancelAuthBtn" type="button" class="btn-cancel">Cancel</button>
                <button id="confirmDeleteBtn" type="button" class="btn-yes">Delete account</button>
            </div>
        </div>
    </div>

    <script>
        function enableField(id) {
            const field = document.getElementById(id);
            if (!field) return;
            field.removeAttribute('readonly');
            field.classList.add('editable');
            field.focus();
        }

        document.querySelectorAll('.input-icon').forEach(button => {
            button.addEventListener('click', () => {
                const target = button.dataset.target;
                if (!target) return;
                enableField(target);
            });
        });

        const deleteAccountBtn = document.getElementById('deleteAccountBtn');
        const confirmOverlay = document.getElementById('confirmOverlay');
        const authOverlay = document.getElementById('authOverlay');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const proceedDeleteBtn = document.getElementById('proceedDeleteBtn');
        const cancelAuthBtn = document.getElementById('cancelAuthBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const currentPassword = document.getElementById('currentPassword');
        const confirmPassword = document.getElementById('confirmPassword');

        deleteAccountBtn.addEventListener('click', () => {
            confirmOverlay.classList.remove('hidden');
        });

        cancelDeleteBtn.addEventListener('click', () => {
            confirmOverlay.classList.add('hidden');
        });

        proceedDeleteBtn.addEventListener('click', () => {
            confirmOverlay.classList.add('hidden');
            authOverlay.classList.remove('hidden');
            currentPassword.focus();
        });

        cancelAuthBtn.addEventListener('click', () => {
            authOverlay.classList.add('hidden');
            currentPassword.value = '';
            confirmPassword.value = '';
        });

        confirmDeleteBtn.addEventListener('click', () => {
            const currentValue = currentPassword.value.trim();
            const confirmValue = confirmPassword.value.trim();

            if (!currentValue || !confirmValue) {
                alert('Please fill in both password fields.');
                return;
            }

            if (currentValue !== confirmValue) {
                alert('Passwords do not match.');
                confirmPassword.focus();
                return;
            }

            window.location.href = 'login/index.html';
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                confirmOverlay.classList.add('hidden');
                authOverlay.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
