<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Flintlock</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <!-- Neumorphic Background -->
    <div class="background-container">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="top-navbar">
        <div class="nav-left">
            <div class="menu-icon">☰</div>
            <!-- Using the white transparent logo -->
            <img src="../assets/logo-name-white.png" alt="Flintlock Logo" class="nav-logo-img">
        </div>
    </nav>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <a href="homepage.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/home.png" alt="Home"><span>Home</span></a>
        <a href="profile.html" class="nav-item active"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/user.png" alt="Profile"><span>Profile</span></a>
        <a href="security.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/lock--v1.png" alt="Security"><span>Security</span></a>
        <a href="about-us.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/info.png" alt="About Us"><span>About Us</span></a>
        <button class="sidebar-logout" id="logoutBtn"><img src="https://img.icons8.com/ios-filled/50/logout-rounded.png" alt="Logout">Logout</button>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="profile-wrapper">
            
            <!-- Left: Profile Card -->
            <div class="profile-card">
                <div class="avatar-circle">
                    <!-- Generic user silhouette -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h3 id="display-name">First Name Last Name</h3>
                <p id="display-username">@username</p>
            </div>

            <!-- Right: Profile Details (Read-only) -->
            <div class="profile-details">
                <div class="detail-row">
                    <div class="field-label-row">
                        <label>Name</label>
                    </div>
                    <div class="name-inputs">
                        <div class="input-group">
                            <input type="text" value="First Name" id="first-name" class="readonly-input" readonly>
                            <button type="button" class="input-icon" data-target="first-name">✏️</button>
                        </div>
                        <div class="input-group">
                            <input type="text" value="Last Name" id="last-name" class="readonly-input" readonly>
                            <button type="button" class="input-icon" data-target="last-name">✏️</button>
                        </div>
                    </div>
                </div>

                <div class="detail-row">
                    <div class="field-label-row">
                        <label>Username</label>
                    </div>
                    <div class="input-group">
                        <input type="text" value="username" id="username" class="readonly-input full-width" readonly>
                        <button type="button" class="input-icon" data-target="username" aria-label="Edit username">✏️</button>
                    </div>
                </div>

                <div class="detail-row">
                    <div class="field-label-row">
                        <label>Email Address</label>
                    </div>
                    <div class="input-group">
                        <input type="email" value="user@example.com" id="email" class="readonly-input full-width" readonly>
                        <button type="button" class="input-icon" data-target="email">✏️</button>
                    </div>
                </div>

                <div class="profile-actions">
                    <button type="button" class="btn-save-changes" id="saveProfileBtn">Save changes</button>
                </div>
            </div>

        </div>
    </main>
    <button id="deleteAccountBtn" type="button" class="btn-delete">Delete Account</button>

    <div class="overlay hidden" id="confirmOverlay">
        <div class="confirm-box">
            <p class="confirm-title">Are you sure you want to delete your account?</p>
            <p class="confirm-subtitle">This cannot be undone.</p>
            <div class="confirm-actions">
                <button id="cancelDeleteBtn" type="button" class="btn-cancel">No</button>
                <button id="proceedDeleteBtn" type="button" class="btn-yes">Yes</button>
            </div>
        </div>
    </div>

    <div class="overlay hidden" id="authOverlay">
        <div class="confirm-box delete-step">
            <p class="confirm-title">Confirm deletion</p>
            <p class="confirm-subtitle">Please enter your password once more before account removal.</p>
            <div class="auth-group">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" placeholder="Enter your password">
            </div>
            <div class="auth-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
            </div>
            <div class="confirm-actions">
                <button id="cancelAuthBtn" type="button" class="btn-cancel">Cancel</button>
                <button id="confirmDeleteBtn" type="button" class="btn-yes">Delete account</button>
            </div>
        </div>
    </div>

    <script>

         function setSidebarState(open) {
            document.body.classList.toggle('nav-open', open);
            localStorage.setItem('sidebarOpen', open ? '1' : '0');
        }

        if (localStorage.getItem('sidebarOpen') === '1') {
            setSidebarState(true);
        }

        document.querySelector('.menu-icon')?.addEventListener('click', () => {
            setSidebarState(!document.body.classList.contains('nav-open'));
        });

        function enableField(id) {
            const field = document.getElementById(id);
            if (!field) return;
            field.removeAttribute('readonly');
            field.classList.add('editable');
            field.focus();
        }

        function lockProfileFields() {
            ['first-name', 'last-name', 'username', 'email'].forEach(function (id) {
                const field = document.getElementById(id);
                if (!field) return;
                field.setAttribute('readonly', 'readonly');
                field.classList.remove('editable');
            });
        }

        function refreshDisplayCard() {
            const first = document.getElementById('first-name').value.trim();
            const last = document.getElementById('last-name').value.trim();
            const uname = document.getElementById('username').value.trim();
            document.getElementById('display-name').textContent = (first + ' ' + last).trim() || 'Unknown User';
            document.getElementById('display-username').textContent = '@' + (uname || 'username');
        }

        document.querySelectorAll('.input-icon').forEach(button => {
            button.addEventListener('click', () => {
                const target = button.dataset.target;
                if (!target) return;
                enableField(target);
            });
        });

        const deleteAccountBtn = document.getElementById('deleteAccountBtn');
        const confirmOverlay = document.getElementById('confirmOverlay');
        const authOverlay = document.getElementById('authOverlay');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
        const proceedDeleteBtn = document.getElementById('proceedDeleteBtn');
        const cancelAuthBtn = document.getElementById('cancelAuthBtn');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const currentPassword = document.getElementById('currentPassword');
        const confirmPassword = document.getElementById('confirmPassword');

        deleteAccountBtn.addEventListener('click', () => {
            confirmOverlay.classList.remove('hidden');
        });

        cancelDeleteBtn.addEventListener('click', () => {
            confirmOverlay.classList.add('hidden');
        });

        proceedDeleteBtn.addEventListener('click', () => {
            confirmOverlay.classList.add('hidden');
            authOverlay.classList.remove('hidden');
            currentPassword.focus();
        });

        cancelAuthBtn.addEventListener('click', () => {
            authOverlay.classList.add('hidden');
            currentPassword.value = '';
            confirmPassword.value = '';
        });

        confirmDeleteBtn.addEventListener('click', () => {
            const currentValue = currentPassword.value.trim();
            const confirmValue = confirmPassword.value.trim();

            if (!currentValue || !confirmValue) {
                alert('Please fill in both password fields.');
                return;
            }

            if (currentValue !== confirmValue) {
                alert('Passwords do not match.');
                confirmPassword.focus();
                return;
            }

            window.location.href = 'login/index.html';
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                confirmOverlay.classList.add('hidden');
                authOverlay.classList.add('hidden');
            }
        });

         const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            const logoutModal = document.createElement('div');
            logoutModal.className = 'logout-modal';
            logoutModal.innerHTML = `
                <div class="logout-modal-content">
                    <h2 class="logout-modal-title">Logout</h2>
                    <p class="logout-modal-text">Are you sure you want to logout?</p>
                    <div class="logout-modal-actions">
                        <button class="logout-modal-cancel" id="cancelLogout">Cancel</button>
                        <button class="logout-modal-confirm" id="confirmLogout">Logout</button>
                    </div>
                </div>
            `;
            document.body.appendChild(logoutModal);

            logoutBtn.addEventListener('click', () => {
                logoutModal.classList.add('show');
            });

            logoutModal.addEventListener('click', (event) => {
                if (event.target === logoutModal) {
                    logoutModal.classList.remove('show');
                }
            });

            logoutModal.querySelector('#cancelLogout')?.addEventListener('click', () => {
                logoutModal.classList.remove('show');
            });

            logoutModal.querySelector('#confirmLogout')?.addEventListener('click', () => {
                localStorage.removeItem('user_id');
                localStorage.removeItem('role');
                window.location.href = 'login/index.html';
            });
        }

        const API_ORIGIN = window.API_ORIGIN || 'http://localhost:8080';

        function parseProfileResponse(response, rawText) {
            if (!rawText || !rawText.trim()) {
                throw new Error('Empty response from server (HTTP ' + response.status + ').');
            }
            try {
                return JSON.parse(rawText);
            } catch (e) {
                throw new Error('Not JSON (HTTP ' + response.status + '): ' + rawText.slice(0, 160));
            }
        }

        async function fetchProfileOnce(userId) {
            const url = API_ORIGIN + '/user/profile?user_id=' + encodeURIComponent(userId);
            const response = await fetch(url);
            const rawText = await response.text();
            const data = parseProfileResponse(response, rawText);

            if (!response.ok || !data.success || !data.data) {
                throw new Error(data.message || ('HTTP ' + response.status));
            }

            const profile = data.data;
            const fullName = (profile.first_name + ' ' + profile.last_name).trim();

            document.getElementById('display-name').textContent = fullName || 'Unknown User';
            document.getElementById('display-username').textContent = '@' + (profile.username || 'username');
            document.getElementById('first-name').value = profile.first_name || '';
            document.getElementById('last-name').value = profile.last_name || '';
            document.getElementById('username').value = profile.username || '';
            document.getElementById('email').value = profile.email || '';
        }

        async function loadUserProfile() {
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                alert('No login session found. Please log in again.');
                window.location.href = 'login/index.html';
                return;
            }

            try {
                await fetchProfileOnce(userId);
            } catch (error) {
                console.error('Profile fetch failed:', error);
                alert('Unable to load profile.\n\n' +
                    (error && error.message ? error.message : String(error)) +
                    '\n\nAPI: ' + API_ORIGIN + '/user/profile');
            }
        }

        loadUserProfile();

        document.getElementById('saveProfileBtn').addEventListener('click', async function () {
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                alert('No login session found. Please log in again.');
                window.location.href = 'login/index.html';
                return;
            }

            const firstName = document.getElementById('first-name').value.trim();
            const lastName = document.getElementById('last-name').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!firstName || !lastName || !username || !email) {
                alert('Please fill in all profile fields before saving.');
                return;
            }

            const formData =
                'user_id=' + encodeURIComponent(userId) +
                '&first_name=' + encodeURIComponent(firstName) +
                '&last_name=' + encodeURIComponent(lastName) +
                '&username=' + encodeURIComponent(username) +
                '&email=' + encodeURIComponent(email);

            const btn = document.getElementById('saveProfileBtn');
            btn.disabled = true;

            try {
                const response = await fetch(API_ORIGIN + '/user/updateProfile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const rawText = await response.text();
                let data;
                try {
                    data = rawText ? JSON.parse(rawText) : {};
                } catch (e) {
                    throw new Error('Invalid server response');
                }

                if (!response.ok || !data.success) {
                    alert(data.message || 'Could not save profile.');
                    return;
                }

                refreshDisplayCard();
                lockProfileFields();
                alert(data.message || 'Profile updated successfully.');
            } catch (err) {
                console.error(err);
                alert('Unable to save profile. Check that the server is running.');
            } finally {
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
