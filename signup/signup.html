<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Flintlock</title>
    
    <link rel="stylesheet" href="/signup/signup.css">
</head>
<body>

    <!-- Background Container -->
    <div class="background-container">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <!-- Main Sign-up Card -->
    <div class="login-card">
        <!-- Left Side: Sign-up Form -->
        <div class="login-left">
            <img src="../assets/login-images/logo-name.png" alt="Flintlock Logo" class="brand-logo">
            <h1 class="login-title">Sign up</h1>
            
            <form action="#" method="POST">
                <!-- Name Row -->
                <div class="input-label">Name</div>
                <div class="input-row">
                    <input type="text" placeholder="First Name" class="standard-input" required>
                    <input type="text" placeholder="Last Name" class="standard-input" required>
                </div>

                <!-- Username Row -->
                <div class="input-label">Username</div>
                <div class="input-group signup-group">
                    <input type="text" placeholder="e.g: juandelacruz396239" required>
                </div>

                <!-- Email Row -->
                <div class="input-label">Email Address</div>
                <div class="input-group signup-group">
                    <input type="email" placeholder="e.g: juandelacruz@gmail.com" required>
                </div>

                <!-- Passwords Row -->
                <div class="input-row-labels">
                    <div class="input-label">Password</div>
                    <div class="input-label">Confirm Password</div>
                </div>
                <div class="input-row">
                    <div class="input-group signup-group">
                        <input type="password" placeholder="*************" required>
                        <span class="icon-right">👁️</span>
                    </div>
                    <div class="input-group signup-group">
                        <input type="password" placeholder="*************" required>
                        <span class="icon-right">👁️</span>
                    </div>
                </div>

                <!-- Action Buttons -->
                <button type="submit" class="btn-login">Create Account</button>
                
                <div class="divider">
                    <span>Or</span>
                </div>
                
                <!-- Link back to the Login page -->
                <button type="button" class="btn-signup" onclick="window.location.href='../login.html'">Log in</button>
            </form>

            <!-- Bottom Right Signature -->
            <div class="team-signature">
                <span>Three Musketeers</span>
                <img src="../assets/login-images/logo.png" alt="Team Icon">
            </div>
        </div>

        <!-- Right Side: Image and Welcome Text -->
        <div class="login-right">
            <h2>Welcome!</h2>
        </div>
    </div>

</body>
</html>
