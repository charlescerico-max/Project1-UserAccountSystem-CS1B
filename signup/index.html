<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Flintlock</title>
    
    <link rel="stylesheet" href="/signup/signup.css">
</head>
<body>

    <!-- Background Container -->
    <div class="background-container">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <!-- Main Sign-up Card -->
    <div class="login-card">
        <!-- Left Side: Sign-up Form -->
        <div class="login-left">
            <img src="../assets/login-images/logo-name.png" alt="Flintlock Logo" class="brand-logo">
            <h1 class="login-title">Sign up</h1>
            
            <form id="signupForm" action="#" method="POST">
                <!-- Name Row -->
                <div class="input-label">Name</div>
                <div class="input-row">
                    <input type="text" id="firstName" name="firstName" placeholder="First Name" class="standard-input" required>
                    <input type="text" id="lastName" name="lastName" placeholder="Last Name" class="standard-input" required>
                </div>

                <!-- Username Row -->
                <div class="input-label">Username</div>
                <div class="input-group signup-group">
                    <input type="text" id="username" name="username" placeholder="e.g: juandelacruz396239" required>
                </div>

                <!-- Email Row -->
                <div class="input-label">Email Address</div>
                <div class="input-group signup-group">
                    <input type="email" id="email" name="email" placeholder="e.g: juandelacruz@gmail.com" required>
                </div>

                <!-- Passwords Row -->
                <div class="input-row-labels">
                    <div class="input-label">Password</div>
                    <div class="input-label">Confirm Password</div>
                </div>
                <div class="input-row">
                    <div class="input-group signup-group">
                        <input type="password" id="password" name="password" placeholder="*************" required>
                    </div>
                    <div class="input-group signup-group">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="*************" required>
                    </div>
                </div>

                <!-- Action Buttons -->
                <button type="submit" class="btn-login">Create Account</button>
                
                <div class="divider">
                    <span>Or</span>
                </div>
                
                <!-- Link back to the Login page -->
                <button type="button" class="btn-signup" onclick="window.location.href='../login/index.html'">Log in</button>
            </form>

            <!-- Bottom Right Signature -->
            <div class="team-signature">
                <span>Three Musketeers</span>
                <img src="../assets/login-images/logo.png" alt="Team Icon">
            </div>
        </div>

        <!-- Right Side: Image and Welcome Text -->
        <div class="login-right">
            <h2>Welcome!</h2>
        </div>
    </div>

<script>
    document.getElementById('signupForm').addEventListener('submit', async function(event) {
        event.preventDefault();

        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value.trim();

        if (password !== confirmPassword) {
            alert('Passwords do not match.');
            return;
        }

        const formData =
            'firstName=' + encodeURIComponent(firstName) +
            '&lastName=' + encodeURIComponent(lastName) +
            '&username=' + encodeURIComponent(username) +
            '&email=' + encodeURIComponent(email) +
            '&password=' + encodeURIComponent(password) +
            '&confirmPassword=' + encodeURIComponent(confirmPassword);

        try {
            const response = await fetch('http://localhost:8080/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            });

            const data = await response.json();
            if (!response.ok || !data.success) {
                alert(data.message || 'Unable to create account.');
                return;
            }

            alert('Account created successfully! You can now log in.');
            window.location.href = '../login/index.html';
        } catch (error) {
            console.error('Signup error:', error);
            alert('Unable to sign up. Please check if the server is running.');
        }
    });
</script>
</body>
</html>
