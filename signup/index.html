<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Flintlock</title>
    
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <!-- Background Container -->
    <div class="background-container">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <!-- Main Sign-up Card -->
    <div class="login-card">
        <!-- Left Side: Sign-up Form -->
        <div class="login-left">
            <img src="../assets/login-images/logo-name.png" alt="Flintlock Logo" class="brand-logo">
            <h1 class="login-title">Sign up</h1>
            
            <form id="signupForm" action="#" method="POST">
                <!-- Name Row -->
                <div class="input-label">Name</div>
                <div class="input-row">
                    <input type="text" id="firstName" name="firstName" placeholder="First Name" class="standard-input" required>
                    <input type="text" id="lastName" name="lastName" placeholder="Last Name" class="standard-input" required>
                </div>

                <!-- Username Row -->
                <div class="input-label">Username</div>
                <div class="input-group signup-group">
                    <input type="text" id="username" name="username" placeholder="e.g: juandelacruz396239" required>
                </div>

                <!-- Email Row -->
                <div class="input-label">Email Address</div>
                <div class="input-group signup-group">
                    <input type="email" id="email" name="email" placeholder="e.g: juandelacruz@gmail.com" required>
                </div>

                <!-- Passwords Row -->
                <div class="input-row-labels">
                    <div class="input-label">Password</div>
                    <div class="input-label">Confirm Password</div>
                </div>
                <div class="input-row">
                    <div class="input-group signup-group">
                        <input type="password" id="password" name="password" placeholder="*************" required>
                    </div>
                    <div class="input-group signup-group">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="*************" required>
                    </div>
                </div>

                <!-- Action Buttons -->
                <button type="submit" class="btn-login">Create Account</button>
                
                <div class="divider">
                    <span>Or</span>
                </div>
                
                <!-- Link back to the Login page -->
                <button type="button" class="btn-signup" onclick="window.location.href='../login/index.html'">Log in</button>
            </form>

            <!-- Bottom Right Signature -->
            <div class="team-signature">
                <span>Three Musketeers</span>
                <img src="../assets/login-images/logo.png" alt="Team Icon">
            </div>
        </div>

        <!-- Right Side: Image and Welcome Text -->
        <div class="login-right">
            <h2>Welcome!</h2>
        </div>
    </div>

<script>
    const USERS_API = new URL('../api/users.php', window.location.href).href;

    document.getElementById('signupForm').addEventListener('submit', async function (event) {
        event.preventDefault();

        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            alert('Passwords do not match.');
            return;
        }

        const submitBtn = event.target.querySelector('button[type="submit"]');
        if (submitBtn) {
            submitBtn.disabled = true;
        }

        try {
            const response = await fetch(USERS_API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'same-origin',
                body: JSON.stringify({
                    first_name: firstName,
                    last_name: lastName,
                    username: username,
                    email: email,
                    password: password
                })
            });

            const text = await response.text();
            let data = {};
            try {
                data = text ? JSON.parse(text) : {};
            } catch {
                data = { error: text || 'Unexpected response from server.' };
            }

            if (!response.ok) {
                alert(data.error || ('Unable to create account (HTTP ' + response.status + ').'));
                return;
            }

            if (!data.user) {
                alert('Unexpected response from server.');
                return;
            }

            alert('Account created successfully! You can now log in.');
            window.location.href = '../login/index.html';
        } catch (error) {
            console.error('Signup error:', error);
            alert('Unable to sign up. Check that Apache and MySQL are running.');
        } finally {
            if (submitBtn) {
                submitBtn.disabled = false;
            }
        }
    });
</script>
</body>
</html>
