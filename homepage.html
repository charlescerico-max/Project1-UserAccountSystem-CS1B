<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage - Flintlock</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="homepage.css">
</head>
<body>

    <!-- Neumorphic Background -->
    <!-- Background Shapes -->
    <div class="background-container">
        <!-- Top Right Group -->
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        
        <!-- Bottom Left Group -->
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="top-navbar">
        <div class="nav-left">
            <div class="menu-icon">☰</div>
            <!-- Using the white transparent logo -->
            <img src="../assets/logo-name-white.png" alt="Flintlock Logo" class="nav-logo-img">
        </div>
    </nav>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <a href="homepage.html" class="nav-item active"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/home.png" alt="Home"><span>Home</span></a>
        <a href="profile.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/user.png" alt="Profile"><span>Profile</span></a>
        <a href="security.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/lock--v1.png" alt="Security"><span>Security</span></a>
        <a href="about-us.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/info.png" alt="About Us"><span>About Us</span></a>
        <button class="sidebar-logout" id="logoutBtn"><img src="https://img.icons8.com/ios-filled/50/logout-rounded.png" alt="Logout">Logout</button>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="profile-wrapper">
            
            <!-- Left: Profile Card -->
            <div class="profile-card">
                <div class="avatar-circle">
                    <!-- Generic user silhouette -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h3 id="display-name">First Name Last Name</h3>
                <p id="display-username">@username</p>
            </div>

            <!-- Right: Profile Details (Read-only) -->
            <div class="profile-details">
                <!-- Name Row -->
                <div class="input-label">NAME</div>
                <div class="input-row">
                    <input type="text" id="first-name-input" value="First Name" class="readonly-input" readonly>
                    <input type="text" id="last-name-input" value="Last Name" class="readonly-input" readonly>
                </div>

                <!-- Username Row -->
                <div class="input-label">USERNAME</div>
                <div class="input-group">
                    <input type="text" id="username-input" value="e.g: juandelacruz396239" class="readonly-input full-width" readonly>
                </div>

                <!-- Email Row -->
                <div class="input-label">EMAIL ADDRESS</div>
                <div class="input-group">
                    <input type="email" id="email-input" value="e.g: juandelacruz@gmail.com" class="readonly-input full-width" readonly>
                </div>
            </div>

        </div>
    </main>

    <div class="logout-modal" id="logoutModal">
        <div class="logout-modal-content">
            <h2 class="logout-modal-title">Logout</h2>
            <p class="logout-modal-text">Are you sure you want to logout?</p>
            <div class="logout-modal-actions">
                <button class="logout-modal-cancel" id="cancelLogout">Cancel</button>
                <button class="logout-modal-confirm" id="confirmLogout">Logout</button>
            </div>
        </div>
    </div>

    <div class="welcome-message hidden" id="welcomeMessage" role="status" aria-live="polite"></div>

    <script>
        const ME_API = new URL('api/me.php', window.location.href).href;
        const LOGOUT_API = new URL('api/logout.php', window.location.href).href;

        function setSidebarState(open) {
            document.body.classList.toggle('nav-open', open);
            localStorage.setItem('sidebarOpen', open ? '1' : '0');
        }

        if (localStorage.getItem('sidebarOpen') === '1') {
            setSidebarState(true);
        }

        document.querySelector('.menu-icon')?.addEventListener('click', () => {
            setSidebarState(!document.body.classList.contains('nav-open'));
        });

        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                document.getElementById('logoutModal').classList.add('show');
            });
        }

        const logoutModal = document.getElementById('logoutModal');
        if (logoutModal) {
            logoutModal.addEventListener('click', (event) => {
                if (event.target === logoutModal) {
                    logoutModal.classList.remove('show');
                }
            });

            document.getElementById('cancelLogout')?.addEventListener('click', () => {
                logoutModal.classList.remove('show');
            });

            document.getElementById('confirmLogout')?.addEventListener('click', async () => {
                try {
                    await fetch(LOGOUT_API, { method: 'GET', credentials: 'same-origin' });
                } catch (e) {
                    console.warn(e);
                }
                localStorage.removeItem('user_id');
                localStorage.removeItem('role');
                localStorage.removeItem('account_type');
                logoutModal.classList.remove('show');
                window.location.href = 'login/index.html';
            });
        }

        function showWelcomeMessage(firstName) {
            const message = document.getElementById('welcomeMessage');
            if (!message) {
                return;
            }
            message.textContent = 'Welcome, ' + (firstName || 'User');
            message.classList.remove('hidden');
            setTimeout(() => {
                message.classList.add('hidden');
            }, 2000);
        }

        function applyProfileToPage(profile) {
            const fullName = ((profile.first_name || '') + ' ' + (profile.last_name || '')).trim();
            document.getElementById('display-name').textContent = fullName || 'Unknown User';
            document.getElementById('display-username').textContent = '@' + (profile.username || 'username');
            document.getElementById('first-name-input').value = profile.first_name || '';
            document.getElementById('last-name-input').value = profile.last_name || '';
            document.getElementById('username-input').value = profile.username || '';
            document.getElementById('email-input').value = profile.email || '';
        }

        async function loadUserProfile() {
            try {
                const response = await fetch(ME_API, { credentials: 'same-origin' });
                const text = await response.text();
                let data = {};
                try {
                    data = text ? JSON.parse(text) : {};
                } catch {
                    data = { error: text || 'Invalid response' };
                }

                if (response.status === 401) {
                    window.location.href = 'login/index.html';
                    return;
                }

                if (!response.ok || !data.user) {
                    const msg = data.error || ('HTTP ' + response.status);
                    throw new Error(msg);
                }

                applyProfileToPage(data.user);

                if (sessionStorage.getItem('show_login_welcome') === '1') {
                    sessionStorage.removeItem('show_login_welcome');
                    showWelcomeMessage(data.user.first_name);
                }
            } catch (error) {
                console.error('Profile fetch failed:', error);
                alert('Unable to load profile.\n\n' + (error && error.message ? error.message : String(error)));
            }
        }

        loadUserProfile();
    </script>
</body>
</html>
