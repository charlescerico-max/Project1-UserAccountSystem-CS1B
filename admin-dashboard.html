<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Flintlock</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="admin-dashboard.css">
</head>
<body>
    <div class="background-container">
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

    <nav class="top-navbar">
        <div class="nav-left">
            <div class="menu-icon">☰</div>
            <img src="assets/logo-name-white.png" alt="Flintlock Logo" class="nav-logo-img">
        </div>
    </nav>

    <aside class="sidebar">
        <a href="admin-dashboard.html" class="nav-item active"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/wrench.png" alt="Dashboard"><span>Dashboard</span></a>
        <a href="admin-profile.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/user.png" alt="Admin Profile"><span>Profile</span></a>
        <a href="admin-security.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/lock--v1.png" alt="Security"><span>Security</span></a>
        <a href="admin-about-us.html" class="nav-item"><img class="nav-icon" src="https://img.icons8.com/ios-filled/50/info.png" alt="About Us"><span>About Us</span></a>
        <button class="sidebar-logout" id="logoutBtn"><img src="https://img.icons8.com/ios-filled/50/logout-rounded.png" alt="Logout">Logout</button>
    </aside>

    <main class="main-content">
        <section class="admin-card">
            <div class="admin-header">
                <h1>User Management</h1>
                <div class="filter-row">
                    <label class="search-field">
                        <span>🔍</span>
                        <input type="search" id="userSearchInput" placeholder="Search name, email, username" aria-label="Search users">
                    </label>
                    <div class="filter-chips">
                        <div class="role-filter-wrap">
                            <button type="button" class="filter-chip filter-chip-role" id="roleFilterBtn" aria-expanded="false" aria-haspopup="true" aria-controls="roleFilterPanel" title="Filter the table by account role">Role</button>
                            <div class="role-filter-panel hidden" id="roleFilterPanel" role="menu" aria-labelledby="roleFilterBtn">
                                <button type="button" class="role-filter-option" role="menuitem" data-role-filter="user">User</button>
                                <button type="button" class="role-filter-option" role="menuitem" data-role-filter="admin">Admin</button>
                                <button type="button" class="role-filter-clear" role="menuitem" id="roleFilterClear" disabled>Both</button>
                            </div>
                        </div>
                        <div class="time-filter-wrap">
                            <button type="button" class="filter-chip filter-chip-time" id="timeFilterBtn" aria-expanded="false" aria-haspopup="true" aria-controls="timeFilterPanel" title="Filter by join date">All Time</button>
                            <div class="time-filter-panel hidden" id="timeFilterPanel" role="menu" aria-labelledby="timeFilterBtn">
                                <button type="button" class="time-filter-option" role="menuitem" data-time-filter="all">All time</button>
                                <button type="button" class="time-filter-option" role="menuitem" data-time-filter="year">Past year</button>
                                <button type="button" class="time-filter-option" role="menuitem" data-time-filter="month">Past month</button>
                                <button type="button" class="time-filter-option" role="menuitem" data-time-filter="week">Past week</button>
                                <button type="button" class="time-filter-option" role="menuitem" data-time-filter="today">Today</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th><input type="checkbox" aria-label="Select all"></th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Join Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr class="is-loading">
                            <td colspan="7">Loading users…</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="userPagination" aria-live="polite"></div>
        </section>
    </main>

        <div class="logout-modal" id="logoutModal">
            <div class="logout-modal-content">
                <h2 class="logout-modal-title">Logout</h2>
                <p class="logout-modal-text">Are you sure you want to logout?</p>
                <div class="logout-modal-actions">
                    <button class="logout-modal-cancel" id="cancelLogout">Cancel</button>
                    <button class="logout-modal-confirm" id="confirmLogout">Logout</button>
                </div>
            </div>
        </div>

    <!-- Edit User Overlay -->
    <div class="overlay hidden" id="editUserOverlay">
        <div class="confirm-box">
            <p class="confirm-title">Edit User</p>
            <div style="text-align: left;">
                <div class="auth-group">
                    <label for="editFirstName">First name</label>
                    <input type="text" id="editFirstName" placeholder="First name">
                </div>
                <div class="auth-group">
                    <label for="editLastName">Last name</label>
                    <input type="text" id="editLastName" placeholder="Last name">
                </div>
                <div class="auth-group">
                    <label for="editEmail">Email Address</label>
                    <input type="email" id="editEmail" placeholder="Enter email address">
                </div>
            </div>
            <div class="confirm-actions">
                <button id="cancelEditBtn" type="button" class="btn-cancel">Cancel</button>
                <button id="saveEditBtn" type="button" class="btn-yes">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Delete User Confirmation Overlay -->
    <div class="overlay hidden" id="deleteConfirmOverlay">
        <div class="confirm-box">
            <p class="confirm-title">Are you sure you want to delete this user?</p>
            <p class="confirm-subtitle">This action cannot be undone.</p>
            <div class="confirm-actions">
                <button id="cancelDeleteConfirmBtn" type="button" class="btn-cancel">No</button>
                <button id="proceedDeleteBtn" type="button" class="btn-yes">Yes</button>
            </div>
        </div>
    </div>

    <div class="welcome-message hidden" id="welcomeMessage" role="status" aria-live="polite"></div>

    <script>
        const API_ORIGIN = window.API_ORIGIN || 'http://localhost:8080';

        const PAGE_BASE = new URL('.', window.location.href).href;
        function apiPhp(path) {
            return new URL(path, PAGE_BASE).href;
        }
        const USERS_API = apiPhp('api/users.php');
        const ADMINS_API = apiPhp('api/admins.php');
        const LOGOUT_API = apiPhp('api/logout.php');

        const userTableBody = document.getElementById('userTableBody');
        const userPagination = document.getElementById('userPagination');
        const userSearchInput = document.getElementById('userSearchInput');
        const roleFilterBtn = document.getElementById('roleFilterBtn');
        const roleFilterPanel = document.getElementById('roleFilterPanel');
        const roleFilterClear = document.getElementById('roleFilterClear');
        const timeFilterBtn = document.getElementById('timeFilterBtn');
        const timeFilterPanel = document.getElementById('timeFilterPanel');
        const selectAllCheckbox = document.querySelector('thead input[type="checkbox"]');

        const TIME_PRESET_LABEL = {
            all: 'All time',
            year: 'Past year',
            month: 'Past month',
            week: 'Past week',
            today: 'Today'
        };

        let currentRoleFilter = null;
        let currentTimePreset = 'all';
        let searchText = '';
        let selectedAccountType = null;
        let selectedAccountId = null;
        let allAccounts = [];

        function mergeAccountLists(usersArr, adminsArr) {
            const u = (usersArr || []).map((row) => ({
                accountType: 'user',
                id: Number(row.user_id),
                user_id: Number(row.user_id),
                first_name: row.first_name,
                last_name: row.last_name,
                email: row.email,
                username: row.username,
                created_at: row.created_at,
                created_by: row.created_by,
                updated_by: row.updated_by,
                updated_at: row.updated_at,
            }));
            const a = (adminsArr || []).map((row) => ({
                accountType: 'admin',
                id: Number(row.admin_id),
                admin_id: Number(row.admin_id),
                first_name: row.first_name,
                last_name: row.last_name,
                email: row.email,
                username: row.username,
                created_at: row.created_at,
                created_by: row.created_by,
                updated_by: row.updated_by,
                updated_at: row.updated_at,
            }));
            return u.concat(a);
        }

        function findAccount(accountType, id) {
            return allAccounts.find((x) => x.accountType === accountType && x.id === id);
        }

        function escapeHtml(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function showToast(text, isError) {
            const message = document.getElementById('welcomeMessage');
            if (!message) return;
            message.textContent = text;
            message.classList.toggle('toast-error', !!isError);
            message.classList.remove('hidden');
            clearTimeout(showToast._t);
            showToast._t = setTimeout(() => {
                message.classList.add('hidden');
                message.classList.remove('toast-error');
            }, 3200);
        }

        function normalizeRoleFromCell(text) {
            const t = (text || '').trim().toLowerCase();
            return t === 'admin' ? 'admin' : 'user';
        }

        function startOfLocalDay(d) {
            return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
        }

        function parseJoinDateMs(cellText) {
            const d = new Date((cellText || '').trim());
            if (Number.isNaN(d.getTime())) {
                return NaN;
            }
            return startOfLocalDay(d);
        }

        function syncRowAttributes() {
            userTableBody?.querySelectorAll('tr').forEach((tr) => {
                if (!tr.dataset.accountId) {
                    return;
                }
                const cells = tr.querySelectorAll('td');
                if (cells.length < 6) {
                    return;
                }
                tr.dataset.role = normalizeRoleFromCell(cells[4].textContent);
                const jm = parseJoinDateMs(cells[5].textContent);
                tr.dataset.joinMs = Number.isNaN(jm) ? (tr.dataset.joinMs || '') : String(jm);
            });
        }

        function formatJoinDate(createdAt) {
            if (!createdAt) return '—';
            const d = new Date(String(createdAt).replace(' ', 'T'));
            if (Number.isNaN(d.getTime())) {
                return String(createdAt);
            }
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function joinMsFromCreated(createdAt) {
            const d = new Date(String(createdAt || '').replace(' ', 'T'));
            if (Number.isNaN(d.getTime())) {
                return NaN;
            }
            return startOfLocalDay(d);
        }

        function getVisibleBodyRows() {
            return Array.from(userTableBody?.querySelectorAll('tr') || []).filter((tr) => {
                if (!tr.dataset.accountId) {
                    return false;
                }
                return !tr.classList.contains('filtered-out');
            });
        }

        function getVisibleBodyCheckboxes() {
            return getVisibleBodyRows()
                .map((tr) => tr.querySelector('input[type="checkbox"]'))
                .filter(Boolean);
        }

        function rowMatchesSearch(tr) {
            if (!searchText) {
                return true;
            }
            const cells = tr.querySelectorAll('td');
            if (cells.length < 6) {
                return true;
            }
            const blob = [1, 2, 3].map((i) => (cells[i].textContent || '').toLowerCase()).join(' ');
            return blob.includes(searchText);
        }

        function joinMatchesTimePreset(joinMs, preset) {
            if (!preset || preset === 'all') {
                return true;
            }
            if (Number.isNaN(joinMs)) {
                return false;
            }
            const now = new Date();
            const sod = startOfLocalDay(now);
            const eod = sod + 86400000 - 1;
            if (preset === 'today') {
                return joinMs >= sod && joinMs <= eod;
            }
            if (preset === 'week') {
                const start = sod - 6 * 86400000;
                return joinMs >= start && joinMs <= eod;
            }
            if (preset === 'month') {
                const start = sod - 29 * 86400000;
                return joinMs >= start && joinMs <= eod;
            }
            if (preset === 'year') {
                const start = sod - 364 * 86400000;
                return joinMs >= start && joinMs <= eod;
            }
            return true;
        }

        function refreshTableFilters() {
            userTableBody?.querySelectorAll('tr').forEach((tr) => {
                if (!tr.dataset.accountId) {
                    tr.classList.remove('filtered-out');
                    return;
                }
                const rowRole = tr.dataset.role || 'user';
                const joinMs = parseFloat(tr.dataset.joinMs, 10);
                const roleOk = !currentRoleFilter || rowRole === currentRoleFilter;
                const dateOk = joinMatchesTimePreset(joinMs, currentTimePreset);
                const searchOk = rowMatchesSearch(tr);
                tr.classList.toggle('filtered-out', !roleOk || !dateOk || !searchOk);
            });

            roleFilterPanel?.querySelectorAll('.role-filter-option').forEach((btn) => {
                const r = btn.getAttribute('data-role-filter');
                btn.classList.toggle('is-selected', currentRoleFilter !== null && r === currentRoleFilter);
            });
            if (roleFilterClear) {
                roleFilterClear.disabled = !currentRoleFilter;
            }
            if (roleFilterBtn) {
                roleFilterBtn.textContent = currentRoleFilter
                    ? 'Role: ' + (currentRoleFilter === 'admin' ? 'Admin' : 'User')
                    : 'Role';
            }

            timeFilterPanel?.querySelectorAll('.time-filter-option').forEach((btn) => {
                const p = btn.getAttribute('data-time-filter');
                btn.classList.toggle('is-selected', p === currentTimePreset);
            });
            if (timeFilterBtn) {
                timeFilterBtn.textContent = currentTimePreset === 'all'
                    ? 'All Time'
                    : (TIME_PRESET_LABEL[currentTimePreset] || currentTimePreset);
            }

            if (selectAllCheckbox) {
                selectAllCheckbox.checked = false;
                selectAllCheckbox.indeterminate = false;
            }
            getVisibleBodyCheckboxes().forEach((cb) => {
                cb.checked = false;
            });
        }

        function applyRoleFilter(role) {
            currentRoleFilter = role;
            refreshTableFilters();
        }

        function applyTimePreset(preset) {
            currentTimePreset = preset === 'year' || preset === 'month' || preset === 'week' || preset === 'today' || preset === 'all'
                ? preset
                : 'all';
            refreshTableFilters();
        }

        function setRolePanelOpen(open) {
            if (!roleFilterPanel || !roleFilterBtn) {
                return;
            }
            roleFilterPanel.classList.toggle('hidden', !open);
            roleFilterBtn.classList.toggle('is-open', open);
            roleFilterBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        function closeRolePanel() {
            setRolePanelOpen(false);
        }

        function setTimePanelOpen(open) {
            if (!timeFilterPanel || !timeFilterBtn) {
                return;
            }
            timeFilterPanel.classList.toggle('hidden', !open);
            timeFilterBtn.classList.toggle('is-open', open);
            timeFilterBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
        }

        function closeTimePanel() {
            setTimePanelOpen(false);
        }

        function closeFilterPanels() {
            closeRolePanel();
            closeTimePanel();
        }

        function setSidebarState(open) {
            document.body.classList.toggle('nav-open', open);
            localStorage.setItem('sidebarOpen', open ? '1' : '0');
        }

        function renderAccounts(merged) {
            allAccounts = merged;
            if (!userTableBody) {
                return;
            }
            if (!merged.length) {
                userTableBody.innerHTML = '<tr><td colspan="7" class="table-empty">No users or admins yet.</td></tr>';
                if (userPagination) {
                    userPagination.textContent = '0 accounts';
                }
                refreshTableFilters();
                return;
            }

            let nu = 0;
            let na = 0;
            userTableBody.innerHTML = merged.map((acc) => {
                if (acc.accountType === 'admin') {
                    na += 1;
                } else {
                    nu += 1;
                }
                const fn = escapeHtml(acc.first_name);
                const full = escapeHtml(`${acc.first_name || ''} ${acc.last_name || ''}`.trim()) || '—';
                const jm = joinMsFromCreated(acc.created_at);
                const jmAttr = Number.isNaN(jm) ? '' : String(jm);
                const roleLabel = acc.accountType === 'admin' ? 'Admin' : 'User';
                const rowRole = acc.accountType === 'admin' ? 'admin' : 'user';
                return (
                    '<tr data-account-type="' + acc.accountType + '" data-account-id="' + acc.id + '" data-role="' + rowRole + '" data-join-ms="' + jmAttr + '">' +
                    '<td><input type="checkbox" aria-label="Select ' + fn + '"></td>' +
                    '<td>' + full + '</td>' +
                    '<td>' + escapeHtml(acc.email) + '</td>' +
                    '<td>' + escapeHtml(acc.username) + '</td>' +
                    '<td>' + roleLabel + '</td>' +
                    '<td>' + escapeHtml(formatJoinDate(acc.created_at)) + '</td>' +
                    '<td class="actions">' +
                    '<button type="button" class="action-btn edit" aria-label="Edit account">✎</button>' +
                    '<button type="button" class="action-btn delete" aria-label="Delete account">🗑</button>' +
                    '</td></tr>'
                );
            }).join('');

            syncRowAttributes();
            refreshTableFilters();
            if (userPagination) {
                userPagination.textContent = merged.length + ' accounts (' + nu + ' users, ' + na + ' admins)';
            }
        }

        async function loadAccounts() {
            if (!userTableBody) {
                return;
            }
            userTableBody.innerHTML = '<tr class="is-loading"><td colspan="7">Loading users and admins…</td></tr>';
            try {
                const [ru, ra] = await Promise.all([
                    fetch(USERS_API, { credentials: 'same-origin' }),
                    fetch(ADMINS_API, { credentials: 'same-origin' }),
                ]);
                const du = await ru.json().catch(() => ({}));
                const da = await ra.json().catch(() => ({}));
                if (!ru.ok) {
                    throw new Error(du.error || ('Users API HTTP ' + ru.status));
                }
                if (!ra.ok) {
                    throw new Error(da.error || ('Admins API HTTP ' + ra.status));
                }
                if (!Array.isArray(du.users) || !Array.isArray(da.admins)) {
                    throw new Error('Unexpected response');
                }
                renderAccounts(mergeAccountLists(du.users, da.admins));
            } catch (err) {
                console.error(err);
                userTableBody.innerHTML = '<tr><td colspan="7" class="table-empty">Could not load accounts. Run <code>database/schema_admins.sql</code> if the <code>admins</code> table is missing, and check Apache/PHP/MySQL.</td></tr>';
                showToast('Failed to load accounts', true);
                if (userPagination) {
                    userPagination.textContent = '';
                }
            }
        }

        async function readJson(res) {
            const text = await res.text();
            try {
                return JSON.parse(text);
            } catch {
                return { _raw: text };
            }
        }

        userTableBody?.addEventListener('click', (e) => {
            const editBtn = e.target.closest('.action-btn.edit');
            const delBtn = e.target.closest('.action-btn.delete');
            const row = e.target.closest('tr');
            if (!row || !row.dataset.accountId) {
                return;
            }
            const accountType = row.dataset.accountType;
            const id = Number(row.dataset.accountId);
            const u = findAccount(accountType, id);
            if (editBtn && u) {
                selectedAccountType = accountType;
                selectedAccountId = id;
                document.getElementById('editFirstName').value = u.first_name || '';
                document.getElementById('editLastName').value = u.last_name || '';
                document.getElementById('editEmail').value = u.email || '';
                document.getElementById('editUserOverlay').classList.remove('hidden');
            }
            if (delBtn) {
                selectedAccountType = accountType;
                selectedAccountId = id;
                document.getElementById('deleteConfirmOverlay').classList.remove('hidden');
            }
        });

        document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
            document.getElementById('editUserOverlay').classList.add('hidden');
        });

        document.getElementById('saveEditBtn')?.addEventListener('click', async () => {
            if (!selectedAccountId || !selectedAccountType) {
                return;
            }
            const patch = {
                first_name: document.getElementById('editFirstName').value.trim(),
                last_name: document.getElementById('editLastName').value.trim(),
                email: document.getElementById('editEmail').value.trim()
            };
            if (selectedAccountType === 'admin') {
                patch.admin_id = selectedAccountId;
            } else {
                patch.user_id = selectedAccountId;
            }
            if (!patch.first_name || !patch.last_name || !patch.email) {
                showToast('First name, last name, and email are required', true);
                return;
            }
            const btn = document.getElementById('saveEditBtn');
            const apiUrl = selectedAccountType === 'admin' ? ADMINS_API : USERS_API;
            btn.disabled = true;
            try {
                const res = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(patch)
                });
                const data = await readJson(res);
                if (!res.ok) {
                    throw new Error(data.error || ('HTTP ' + res.status));
                }
                document.getElementById('editUserOverlay').classList.add('hidden');
                showToast('Account updated');
                await loadAccounts();
            } catch (err) {
                console.error(err);
                showToast(err.message || 'Update failed', true);
            } finally {
                btn.disabled = false;
            }
        });

        document.getElementById('cancelDeleteConfirmBtn')?.addEventListener('click', () => {
            document.getElementById('deleteConfirmOverlay').classList.add('hidden');
        });

        document.getElementById('proceedDeleteBtn')?.addEventListener('click', async () => {
            if (!selectedAccountId || !selectedAccountType) {
                document.getElementById('deleteConfirmOverlay').classList.add('hidden');
                return;
            }
            const btn = document.getElementById('proceedDeleteBtn');
            const apiUrl = selectedAccountType === 'admin' ? ADMINS_API : USERS_API;
            btn.disabled = true;
            try {
                const res = await fetch(apiUrl + '?id=' + encodeURIComponent(String(selectedAccountId)), {
                    method: 'DELETE',
                    credentials: 'same-origin'
                });
                const data = await readJson(res);
                if (!res.ok) {
                    throw new Error(data.error || ('HTTP ' + res.status));
                }
                document.getElementById('deleteConfirmOverlay').classList.add('hidden');
                showToast('Account deleted');
                await loadAccounts();
            } catch (err) {
                console.error(err);
                showToast(err.message || 'Delete failed', true);
            } finally {
                btn.disabled = false;
            }
        });

        userSearchInput?.addEventListener('input', () => {
            searchText = (userSearchInput.value || '').trim().toLowerCase();
            refreshTableFilters();
        });

        roleFilterBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            closeTimePanel();
            const open = roleFilterPanel?.classList.contains('hidden');
            setRolePanelOpen(!!open);
        });

        roleFilterPanel?.querySelectorAll('.role-filter-option').forEach((btn) => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const role = btn.getAttribute('data-role-filter');
                if (role === 'user' || role === 'admin') {
                    applyRoleFilter(role);
                }
                closeRolePanel();
            });
        });

        roleFilterClear?.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentRoleFilter) {
                applyRoleFilter(null);
            }
            closeRolePanel();
        });

        timeFilterBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            closeRolePanel();
            const open = timeFilterPanel?.classList.contains('hidden');
            setTimePanelOpen(!!open);
        });

        timeFilterPanel?.querySelectorAll('.time-filter-option').forEach((btn) => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const preset = btn.getAttribute('data-time-filter');
                if (preset) {
                    applyTimePreset(preset);
                }
                closeTimePanel();
            });
        });

        document.addEventListener('click', () => closeFilterPanels());

        roleFilterPanel?.addEventListener('click', (e) => e.stopPropagation());
        timeFilterPanel?.addEventListener('click', (e) => e.stopPropagation());

        if (localStorage.getItem('sidebarOpen') === '1') {
            setSidebarState(true);
        }

        document.querySelector('.menu-icon')?.addEventListener('click', () => {
            setSidebarState(!document.body.classList.contains('nav-open'));
        });

        selectAllCheckbox?.addEventListener('change', () => {
            getVisibleBodyCheckboxes().forEach((checkbox) => {
                checkbox.checked = selectAllCheckbox.checked;
            });
        });

        userTableBody?.addEventListener('change', (e) => {
            const cb = e.target;
            if (cb.type !== 'checkbox' || cb.closest('thead')) {
                return;
            }
            const visible = getVisibleBodyCheckboxes();
            const allChecked = visible.length > 0 && visible.every((c) => c.checked);
            const someChecked = visible.some((c) => c.checked);
            if (selectAllCheckbox) {
                selectAllCheckbox.checked = allChecked;
                selectAllCheckbox.indeterminate = someChecked && !allChecked;
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeFilterPanels();
                document.getElementById('editUserOverlay')?.classList.add('hidden');
                document.getElementById('deleteConfirmOverlay')?.classList.add('hidden');
            }
        });

        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                document.getElementById('logoutModal').classList.add('show');
            });
        }

        const logoutModal = document.getElementById('logoutModal');
        if (logoutModal) {
            logoutModal.addEventListener('click', (event) => {
                if (event.target === logoutModal) {
                    logoutModal.classList.remove('show');
                }
            });
            document.getElementById('cancelLogout')?.addEventListener('click', () => {
                logoutModal.classList.remove('show');
            });
            document.getElementById('confirmLogout')?.addEventListener('click', async () => {
                try {
                    await fetch(LOGOUT_API, { method: 'GET', credentials: 'same-origin' });
                } catch (e) {
                    console.warn(e);
                }
                logoutModal.classList.remove('show');
                window.location.href = 'login/index.html';
            });
        }

        function showWelcomeMessage(firstName) {
            const message = document.getElementById('welcomeMessage');
            if (!message) {
                return;
            }
            message.textContent = 'Welcome, ' + (firstName || 'Admin');
            message.classList.remove('toast-error');
            message.classList.remove('hidden');
            setTimeout(() => {
                message.classList.add('hidden');
            }, 2000);
        }

        async function loadWelcomeMessage() {
            if (sessionStorage.getItem('show_login_welcome') !== '1') {
                return;
            }
            sessionStorage.removeItem('show_login_welcome');

            const userId = localStorage.getItem('user_id');
            if (!userId) {
                return;
            }

            try {
                const response = await fetch(API_ORIGIN + '/admin/profile?user_id=' + encodeURIComponent(userId));
                const data = await response.json();
                if (!response.ok || !data.success || !data.data) {
                    return;
                }
                showWelcomeMessage(data.data.first_name);
            } catch (error) {
                console.error('Welcome message fetch failed:', error);
            }
        }

        loadAccounts();
        loadWelcomeMessage();
    </script>
</body>
</html>
