<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Flintlock</title>
    <link rel="stylesheet" href="login.css?v=3">
</head>
<body>

    <!-- Background Shapes -->
    <div class="background-container">
        <!-- Top Right Group -->
        <div class="pill pill-1"></div>
        <div class="pill pill-2"></div>
        <div class="pill pill-3"></div>
        
        <!-- Bottom Left Group -->
        <div class="pill pill-4"></div>
        <div class="pill pill-5"></div>
        <div class="pill pill-6"></div>
    </div>

<div class="login-card">
    <!-- Left Side: Login Form -->
    <div class="login-left">
        <img src="../assets/login-images/logo-name.png" alt="Flintlock Logo" class="brand-logo">
        
        <h1 class="login-title">Login</h1>
        
        <form id="loginForm" action="#" method="POST">
            <!-- Username Input -->
            <div class="input-group">
                <span class="icon">👤</span>
                <input type="text" id="username" name="username" placeholder="Username or Email" required>
            </div>
            
            <!-- Password Input -->
            <div class="input-group has-toggle">
                <span class="icon">🔒</span>
                <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                <button type="button" class="password-toggle" id="passwordToggle" aria-label="Show password" aria-pressed="false">👁</button>
            </div>
            
            <!-- Options Row -->
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Remember Me
                </label>
                <div class="role-select">
                    <select id="roleSelect" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="admin">Admin</option>
                        <option value="user">User</option>
                    </select>
                </div>
            </div>

            <!-- Action Buttons -->
            <button type="submit" class="btn-login">Login</button>
            
            <div class="divider">
                <span>Or</span>
            </div>
            
            <button type="button" class="btn-signup" onclick="window.location.href='../signup/index.html'">Sign up</button>
        </form>

        <!-- Bottom Right Signature -->
        <div class="team-signature">
            <span>Three Musketeers</span>
            <img src="../assets/login-images/logo.png" alt="Team Icon">
        </div>
    </div>

    <!-- Right Side: Image and Welcome Text -->
    <div class="login-right">
        <h2>Welcome!</h2>
    </div>
</div>

<script>
    const LOGIN_API = new URL('../api/login.php', window.location.href).href;

    (function initPasswordToggle() {
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('passwordToggle');
        if (!passwordInput || !toggleBtn) {
            return;
        }
        toggleBtn.addEventListener('click', function () {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            toggleBtn.setAttribute('aria-pressed', isHidden ? 'true' : 'false');
            toggleBtn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        });
    })();

    document.getElementById('loginForm').addEventListener('submit', async function (event) {
        event.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const role = document.getElementById('roleSelect').value;

        if (!role) {
            alert('Please select your role.');
            return;
        }

        const submitBtn = event.target.querySelector('button[type="submit"]');
        if (submitBtn) {
            submitBtn.disabled = true;
        }

        try {
            const response = await fetch(LOGIN_API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'same-origin',
                body: JSON.stringify({
                    login: username,
                    password: password,
                    role: role
                })
            });

            const text = await response.text();
            let data = {};
            try {
                data = text ? JSON.parse(text) : {};
            } catch {
                data = { error: text || 'Invalid server response' };
            }

            if (!response.ok || !data.success) {
                alert(data.error || data.message || 'Invalid credentials');
                return;
            }

            localStorage.setItem('user_id', String(data.user_id));
            localStorage.setItem('role', role);
            if (data.account_type) {
                localStorage.setItem('account_type', data.account_type);
            }
            sessionStorage.setItem('show_login_welcome', '1');
            if (role === 'admin') {
                window.location.href = '../admin-dashboard.html';
            } else {
                window.location.href = '../homepage.html';
            }
        } catch (error) {
            console.error('Login error:', error);
            alert('Unable to login. Check that Apache, PHP, and MySQL are running.');
        } finally {
            if (submitBtn) {
                submitBtn.disabled = false;
            }
        }
    });
</script>
</body>
</html>
